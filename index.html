<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="stylesheet" href="/css/fonts.css" />
        <title>To-Do App</title>
    </head>
    <body>
        <header>
            <div id="logo">
                <img src="/img/logo.svg" width="64" height="64" alt="To-Do App Logo">
                <h1>To-Do App</h1>
            </div>
            <form id="new-task-form">
                <input type="text" id="new-task-input" placeholder="Was hast du geplant?" name="task-input">
                <input type="submit" id="new-task-submit" value="Task hinzufügen">
            </form>
        </header>
        <main>
            <h2>Tasks</h2>
            <div id="tasks">
                <div class="task">
                    <input type="text" value="Kirschen kaufen" class="task-text" readonly>
                    <div class="task-actions">
                        <button class="edit">Bearbeiten</button>
                        <button class="delete">Löschen</button>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
